    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body { font-family: system-ui, sans-serif; overflow: hidden; }

    .grok-bubble {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 20px 20px 20px 6px;
    }
    .user-bubble {
      background: linear-gradient(135deg, #2563eb, #1e40af);
      color: white;
      border-radius: 20px 20px 6px 20px;
    }

    /* Таблицы */
    .grok-bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13.5px;
      background: #111827;
      border-radius: 10px;
      overflow: hidden;
    }
    .grok-bubble th {
      background: #1e2937;
      color: #e0e7ff;
      font-weight: 600;
      padding: 10px 12px;
      border-bottom: 2px solid #374151;
    }
    .grok-bubble td {
      padding: 9px 12px;
      border-bottom: 1px solid #374151;
    }
    .grok-bubble tr:last-child td { border-bottom: none; }
    .grok-bubble tr:nth-child(even) { background: #1e2937; }

    /* Списки */
    .grok-bubble ul, .grok-bubble ol {
      padding-left: 26px;
      margin: 12px 0;
    }
    .grok-bubble li {
      margin: 7px 0;
      line-height: 1.65;
    }
    .grok-bubble ul li::marker { color: #64748b; font-size: 1.1em; }

    /* Код */
    .grok-bubble pre {
      background: #111827 !important;
      border-radius: 12px;
      margin: 14px 0;
      padding: 16px !important;
      font-size: 13.5px;
      overflow-x: auto;
    }

    .message-html { max-width: 100%; overflow-x: auto; }
    .message-html code { white-space: pre-wrap; }
    .hidden-input { position: fixed; left: -9999px; top: -9999px; width: 1px; height: 1px; opacity: 0; }

    /* Chat list: keep compact, but reveal full title on hover */
    .chat-item { align-items: flex-start; gap: 10px; }
    .chat-info { min-width: 0; flex: 1 1 auto; }
    .chat-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.35;
    }
    .chat-date {
      margin-top: 3px;
      font-size: 11px;
      line-height: 1.15rem;
      color: #71717a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chat-item:hover .chat-title,
    .chat-item:focus-within .chat-title {
      white-space: normal;
      overflow: visible;
      word-break: break-word;
    }
    .chat-count { margin-top: 2px; }

    /* Message timestamp */

      display: flex;
      flex-direction: column;
      min-width: 0;
      max-width: 100%;
    }
    .message-time {

      line-height: 1rem;
      color: #71717a;
      margin-bottom: 6px;
      padding: 0 4px;
      user-select: text;

      max-width: none !important;

      min-height: 100dvh;
      display: flex;

      gap: 20px;
      width: 100%;
      flex: 1 1 auto;

    function t(key, ...args) {
      const template = (I18N[UI_LOCALE] && I18N[UI_LOCALE][key]) || I18N.en[key] || key;
      return String(template).replace(/\{(\d+)\}/g, (_, index) => args[Number(index)] ?? "");
    }

    function applyTranslations() {
      document.documentElement.lang = UI_LOCALE;
      document.title = t("documentTitle");

      document.querySelectorAll("[data-i18n]").forEach(element => {
        element.textContent = t(element.dataset.i18n);
      });

      document.querySelectorAll("[data-i18n-html]").forEach(element => {
        element.innerHTML = t(element.dataset.i18nHtml);
      });

      document.querySelectorAll("[data-i18n-title]").forEach(element => {
        element.title = t(element.dataset.i18nTitle);
      });

      document.querySelectorAll("[data-i18n-placeholder]").forEach(element => {
        element.placeholder = t(element.dataset.i18nPlaceholder);
      });
    }

    const UUID_SOURCE = "[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}";
    const UUID_RE_GLOBAL = new RegExp(UUID_SOURCE, "g");
    const UUID_RE_EXACT = new RegExp("^" + UUID_SOURCE + "$", "i");

    if (window.marked && typeof marked.setOptions === "function") {
      marked.setOptions({ gfm: true, breaks: true, tables: true });
    }

      applyTranslations();
      document.getElementById("nativePickerButton").addEventListener("click", selectExportDataFolder);
      document.getElementById("fallbackPickerButton").addEventListener("click", openDirectoryInputFallback);
      document.getElementById("chatSearch").addEventListener("input", filterChats);
      document.getElementById("fullScreenButton").addEventListener("click", toggleFullScreen);
      document.getElementById("exportButton").addEventListener("click", exportCurrentChat);
      document.getElementById("timelineReset").addEventListener("click", resetTimelineFilter);
      setupTimelinePointerEvents();
      window.addEventListener("resize", () => renderTimelineCanvas());
      console.log(t("consoleReady"), "color:#10b981");
    });

    async function selectExportDataFolder() {
      clearStatus();
      setStatus(t("statusOpeningFolder"));

      if ("showDirectoryPicker" in window) {
        try {
          const dirHandle = await window.showDirectoryPicker({
            id: "grok-export-data",
            mode: "read"
          });
          await processDirectoryHandle(dirHandle);
          return;
        } catch (err) {
          if (err && err.name === "AbortError") {
            setStatus(t("statusFolderSelectionCanceled"));
            return;
          }
          console.warn("showDirectoryPicker failed:", err);
          setStatus(
            t("statusNativePickerFailed", escapeHtml(err?.message || String(err))) +
            "<br>" + t("statusPressFallback")
          );
          return;
        }
      }

      setStatus(t("statusDirectoryPickerUnavailable"));
    }

    function openDirectoryInputFallback() {
      const input = document.getElementById("folderInput");

          return;
        }
        await processFileList(Array.from(input.files));
      };
      input.click();
    }

    async function processDirectoryHandle(rootHandle) {
      setStatus(t("statusReadingFolderRecursive"));
      const files = [];
      for await (const item of walkDirectory(rootHandle)) files.push(item);

      if (files.length === 0) throw new Error(t("errorSelectedFolderEmpty"));
      await processVirtualFiles(files);
    }

    async function* walkDirectory(dirHandle, prefix = "") {
      for await (const [name, handle] of dirHandle.entries()) {
        const relPath = prefix ? prefix + "/" + name : name;
        if (handle.kind === "file") {
          const file = await handle.getFile();
          yield { file, path: relPath };
        } else if (handle.kind === "directory") {
          yield* walkDirectory(handle, relPath);
        }
      }
    }

    async function processFileList(fileList) {
      setStatus(t("statusReadingFallbackFolder"));
      const virtualFiles = fileList.map(file => ({
        file,
        path: normalizePath(file.webkitRelativePath || file.name)
      }));
      await processVirtualFiles(virtualFiles);
    }

    async function processVirtualFiles(virtualFiles) {
      try {
        const backendCandidates = virtualFiles.filter(v => basename(v.path) === "prod-grok-backend.json");
        if (backendCandidates.length === 0) {
          showError(t("errorBackendNotFoundTitle"), t("errorBackendNotFoundDetail"));
          return;
        }

        const backendText = await backendCandidates[0].file.text();
        let data;
        try {
          data = JSON.parse(backendText);
        } catch (err) {
          showError(t("errorBackendInvalidJsonTitle"), err.message);
          return;
        }

        assetIndex = {};
        let assetCount = 0;

        for (const v of virtualFiles) {
          const assetId = getAssetIdFromVirtualFile(v);
          if (!assetId) continue;

          const buffer = await v.file.arrayBuffer();
          const bytes = new Uint8Array(buffer);
          const { ext, mime } = detectAssetType(bytes, v.file.name);

          if (assetIndex[assetId]?.url) URL.revokeObjectURL(assetIndex[assetId].url);

          assetIndex[assetId] = {
            id: assetId,
            file: v.file,
            path: v.path,
            ext,
            mime,
            url: URL.createObjectURL(v.file),
            displayName: assetId + "." + ext
          };
          assetCount++;
        }

        allChats = parseFullExport(data, assetIndex);

        if (!allChats.length) {
          showError(t("errorChatsNotFoundTitle"), t("errorChatsNotFoundDetail"));
          return;
        }

        currentChat = null;
        document.getElementById("pickerPanel").classList.add("hidden");
        document.getElementById("mainUI").classList.remove("hidden");
        document.getElementById("chatCount").textContent = String(allChats.length);
        buildTimeline(allChats);
        const firstVisibleChat = getCurrentlyFilteredChats()[0] || allChats[0];
        renderChatList(getCurrentlyFilteredChats());
        showChat(firstVisibleChat);

        setStatus(t("statusDone", allChats.length, assetCount));
        console.log("[Grok Export Viewer] backend:", backendCandidates[0].path);
        console.log("[Grok Export Viewer] assets:", assetIndex);
        console.log("[Grok Export Viewer] chats:", allChats);
      } catch (err) {
        showError(t("errorProcessingFolderTitle"), err?.stack || err?.message || String(err));
      }
    }

    function getAssetIdFromVirtualFile(v) {
      const path = normalizePath(v.path);
      const name = basename(path);
      const lower = path.toLowerCase();

      if (lower.includes("prod-mc-asset-server/") && name.toLowerCase() === "content") {
        const uuids = path.match(UUID_RE_GLOBAL) || [];
        if (uuids.length > 0) return uuids[uuids.length - 1].toLowerCase();

        const parent = parentFolderName(path);
        if (UUID_RE_EXACT.test(parent)) return parent.toLowerCase();
      }

      const base = name.replace(/\.(content|bin|png|jpg|jpeg|gif|webp|pdf|txt|json|zip|csv|mp4|webm|mp3|wav)$/i, "");
      if (UUID_RE_EXACT.test(base)) return base.toLowerCase();

      return null;
    }

    function parseFullExport(data, assets) {
      const chats = [];
      const conversations = Array.isArray(data?.conversations)
        ? data.conversations
        : Array.isArray(data?.data?.conversations)
          ? data.data.conversations
          : [];

      for (const wrapper of conversations) {
        const conv = wrapper.conversation || wrapper;
        const responses = wrapper.responses || conv.responses || wrapper.messages || conv.messages || [];

        const messages = responses.map((item, index) => {
          const r = item.response || item.message || item;
          const textForUuidSearch = safeStringify(r);
          const uuids = [...new Set((textForUuidSearch.match(UUID_RE_GLOBAL) || []).map(u => u.toLowerCase()))];
          const linked = uuids.filter(u => assets[u]).map(u => assets[u]);

          return {
            id: r.id || r._id || r.response_id || String(index),
            parent_response_id: r.parent_response_id || r.parentId || null,
            sender: r.sender || r.author || r.role || "unknown",
            message: extractMessageText(r),
            created_at: extractDateValue(r) || extractDateValue(item) || null,
            assets: linked,
            raw: r
          };
        });

        chats.push({
          id: conv.id || conv._id || conv.conversation_id || cryptoRandomId(),
          title: conv.title || conv.name || t("untitled"),
          created: extractDateValue(conv) || extractDateValue(wrapper) || messages[0]?.created_at || messages[messages.length - 1]?.created_at || null,
          raw: conv,
          messages
        });
      }

      return chats;
    }

    function extractMessageText(r) {
      const candidates = [r.message, r.text, r.content, r.body, r.response, r.markdown];

      for (const value of candidates) {
        if (typeof value === "string" && value.trim()) return value;
        if (value && typeof value === "object") {
          const s = objectToReadableText(value);
          if (s.trim()) return s;
        }
      }

      const usefulKeys = ["generated_image_urls", "image_url", "image_urls", "attachments", "file_attachments", "asset_ids", "media"];
      const pieces = [];
      for (const key of usefulKeys) {
        if (r[key]) pieces.push("`" + key + "`:" + "\n\n```json\n" + JSON.stringify(r[key], null, 2) + "\n```");
      }

      return pieces.join("\n\n");
    }

    function objectToReadableText(obj) {
      if (Array.isArray(obj)) return obj.map(objectToReadableText).filter(Boolean).join("\n\n");
      if (obj && typeof obj === "object") {
        if (typeof obj.text === "string") return obj.text;
        if (typeof obj.content === "string") return obj.content;
        if (Array.isArray(obj.parts)) return obj.parts.map(objectToReadableText).filter(Boolean).join("\n\n");
        return "```json\n" + JSON.stringify(obj, null, 2) + "\n```";
      }
      return "";
    }

    function renderChatList(list) {

      if (window.Prism && typeof Prism.highlightAllUnder === "function") Prism.highlightAllUnder(area);

    function parseMarkdown(text) {
      if (window.marked && typeof marked.parse === "function") return marked.parse(String(text || ""));
      return escapeHtml(String(text || "")).replace(/\n/g, "<br>");
    }

    function isUserSender(sender) {
      const s = String(sender || "").toLowerCase();
      return ["human", "user", "me", "client"].includes(s);
    }

    function detectAssetType(bytes, fileName = "") {
      const lower = fileName.toLowerCase();
      if (bytes[0] === 0xFF && bytes[1] === 0xD8 && bytes[2] === 0xFF) return { ext: "jpg", mime: "image/jpeg" };
      if (bytes[0] === 0x89 && bytes[1] === 0x50 && bytes[2] === 0x4E && bytes[3] === 0x47) return { ext: "png", mime: "image/png" };
      if (bytes[0] === 0x47 && bytes[1] === 0x49 && bytes[2] === 0x46) return { ext: "gif", mime: "image/gif" };
      if (bytes[0] === 0x52 && bytes[1] === 0x49 && bytes[2] === 0x46 && bytes[3] === 0x46 && bytes[8] === 0x57 && bytes[9] === 0x45 && bytes[10] === 0x42 && bytes[11] === 0x50) return { ext: "webp", mime: "image/webp" };
      if (bytes[0] === 0x25 && bytes[1] === 0x50 && bytes[2] === 0x44 && bytes[3] === 0x46) return { ext: "pdf", mime: "application/pdf" };
      if (bytes[0] === 0x50 && bytes[1] === 0x4B && bytes[2] === 0x03 && bytes[3] === 0x04) return { ext: "zip", mime: "application/zip" };
      if (lower.endsWith(".mp4")) return { ext: "mp4", mime: "video/mp4" };
      if (lower.endsWith(".webm")) return { ext: "webm", mime: "video/webm" };
      if (lower.endsWith(".mp3")) return { ext: "mp3", mime: "audio/mpeg" };
      if (lower.endsWith(".wav")) return { ext: "wav", mime: "audio/wav" };

      try {
        const sample = new TextDecoder("utf-8", { fatal: true }).decode(bytes.slice(0, 2048)).trim();
        if (sample.startsWith("{") || sample.startsWith("[")) return { ext: "json", mime: "application/json" };
        return { ext: "txt", mime: "text/plain" };
      } catch {
        return { ext: "bin", mime: "application/octet-stream" };
      }
    }

    function exportCurrentChat() {
      if (!currentChat) return;
      let md = "# " + currentChat.title + "\n\n";

      currentChat.messages.forEach(m => {
        md += "**" + (isUserSender(m.sender) ? "Вы" : "Grok") + "**:\n\n" + (m.message || "[пустое сообщение]") + "\n\n";
        if (m.assets?.length) {
          md += "**Вложения:**\n";
          m.assets.forEach(a => md += "- " + a.displayName + " (" + a.mime + ")\n");
          md += "\n";
        }
        md += "---\n\n";
      });

      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([md], { type: "text/markdown" }));
      a.download = sanitizeFileName(currentChat.title) + ".md";
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }

    function toggleFullScreen() {

      if (!ui) return;
      ui.classList.toggle("sidebar-hidden");

    }

    function setStatus(html) {

      box.classList.remove("hidden");
      box.innerHTML = html;

    function clearStatus() {

    function showError(title, detail = "") {
      setStatus(
        '<div class="text-red-300 font-semibold mb-2">' + escapeHtml(title) + '</div>' +
        '<div class="text-zinc-400 whitespace-pre-wrap">' + escapeHtml(String(detail)) + '</div>'
      );
      console.error("[Grok Export Viewer]", title, detail);
    }

    function safeStringify(value) {
      try { return JSON.stringify(value); } catch { return ""; }
    }

    function normalizePath(path) {
      return String(path || "").replace(/\\/g, "/");
    }

    function basename(path) {
      const parts = normalizePath(path).split("/");
      return parts[parts.length - 1] || "";
    }

    function parentFolderName(path) {
      const parts = normalizePath(path).split("/").filter(Boolean);
      return parts[parts.length - 2] || "";
    }

    function getChatDisplayDate(chat) {
      const messages = isTimelineFilterActive() ? getTimelineVisibleMessages(chat) : (Array.isArray(chat?.messages) ? chat.messages : []);

      // В боковом списке показываем дату последнего видимого сообщения.
      for (const m of [...messages].reverse()) {
        const d = getMessageDate(m);
        if (d) return formatDateMaybe(d);
      }

      return formatDateMaybe(chat?.created) || formatDateMaybe(extractDateValue(chat?.raw)) || "";
    }


    const timelineState = {
      points: [],
      min: null,
      max: null,
      selectedMin: null,
      selectedMax: null,
      dragStartMs: null,
      dragging: false,
      histogram: []
    };

    function buildTimeline(chats) {
      const points = [];
      for (const chat of chats || []) {
        for (const msg of chat.messages || []) {
          const d = getMessageDate(msg);
          if (d) points.push(d.getTime());
        }
      }

      points.sort((a, b) => a - b);
      timelineState.points = points;

      const bar = document.getElementById("timelineBar");
      if (!points.length) {
        bar.classList.add("hidden");
        return;
      }

      let min = points[0];
      let max = points[points.length - 1];
      if (min === max) {
        min -= 12 * 60 * 60 * 1000;
        max += 12 * 60 * 60 * 1000;
      }

      const pad = Math.max((max - min) * 0.015, 60 * 60 * 1000);
      timelineState.min = min - pad;
      timelineState.max = max + pad;
      timelineState.selectedMin = timelineState.min;
      timelineState.selectedMax = timelineState.max;
      rebuildTimelineHistogram();
      bar.classList.remove("hidden");
      updateTimelineLabel();
      requestAnimationFrame(renderTimelineCanvas);
    }

    function rebuildTimelineHistogram() {
      const bins = 180;
      const hist = new Array(bins).fill(0);
      const min = timelineState.min;
      const max = timelineState.max;
      const span = Math.max(1, max - min);

      for (const t of timelineState.points) {
        const i = Math.max(0, Math.min(bins - 1, Math.floor(((t - min) / span) * bins)));
        hist[i]++;
      }

      timelineState.histogram = hist;
    }

    function setupTimelinePointerEvents() {
      const canvas = document.getElementById("timelineCanvas");
      if (!canvas) return;

      canvas.addEventListener("pointerdown", event => {
        if (!timelineState.points.length) return;
        canvas.setPointerCapture(event.pointerId);
        const ms = timelineMsFromEvent(event);
        timelineState.dragging = true;
        timelineState.dragStartMs = ms;
        timelineState.selectedMin = ms;
        timelineState.selectedMax = ms;
        updateTimelineLabel();
        renderTimelineCanvas();
        event.preventDefault();
      });

      canvas.addEventListener("pointermove", event => {
        if (!timelineState.dragging) return;
        const ms = timelineMsFromEvent(event);
        timelineState.selectedMin = Math.min(timelineState.dragStartMs, ms);
        timelineState.selectedMax = Math.max(timelineState.dragStartMs, ms);
        enforceMinimumTimelineSelection();
        updateTimelineLabel();
        renderTimelineCanvas();
      });

      canvas.addEventListener("pointerup", event => {
        if (!timelineState.dragging) return;
        timelineState.dragging = false;
        const ms = timelineMsFromEvent(event);
        timelineState.selectedMin = Math.min(timelineState.dragStartMs, ms);
        timelineState.selectedMax = Math.max(timelineState.dragStartMs, ms);
        enforceMinimumTimelineSelection();
        applyTimelineFilter();
      });

      canvas.addEventListener("pointercancel", () => {
        timelineState.dragging = false;
      });

      canvas.addEventListener("dblclick", event => {
        event.preventDefault();
        resetTimelineFilter();
      });
    }

    function timelineMsFromEvent(event) {
      const canvas = document.getElementById("timelineCanvas");
      const rect = canvas.getBoundingClientRect();
      const x = Math.max(0, Math.min(rect.width, event.clientX - rect.left));
      const ratio = rect.width > 0 ? x / rect.width : 0;
      return timelineState.min + ratio * (timelineState.max - timelineState.min);
    }

    function enforceMinimumTimelineSelection() {
      const minSpan = Math.max((timelineState.max - timelineState.min) / 300, 60 * 1000);
      if (timelineState.selectedMax - timelineState.selectedMin < minSpan) {
        const mid = (timelineState.selectedMin + timelineState.selectedMax) / 2;
        timelineState.selectedMin = Math.max(timelineState.min, mid - minSpan / 2);
        timelineState.selectedMax = Math.min(timelineState.max, mid + minSpan / 2);
      }
    }

    function renderTimelineCanvas() {
      const canvas = document.getElementById("timelineCanvas");
      if (!canvas || !timelineState.points.length || canvas.offsetParent === null) return;

      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.floor(rect.width * dpr));
      const height = Math.max(1, Math.floor(rect.height * dpr));
      if (canvas.width !== width) canvas.width = width;
      if (canvas.height !== height) canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, width, height);

      const hist = timelineState.histogram;
      const maxCount = Math.max(1, ...hist);
      const binW = width / hist.length;

      for (let i = 0; i < hist.length; i++) {
        if (!hist[i]) continue;
        const h = Math.max(1, (hist[i] / maxCount) * (height - 7));
        ctx.fillStyle = "#d4d4d8";
        ctx.fillRect(Math.floor(i * binW), height - h - 2, Math.max(1, Math.ceil(binW)), h);
      }

      const min = timelineState.min;
      const span = Math.max(1, timelineState.max - min);
      const x1 = ((timelineState.selectedMin - min) / span) * width;
      const x2 = ((timelineState.selectedMax - min) / span) * width;
      const left = Math.max(0, Math.min(x1, x2));
      const right = Math.min(width, Math.max(x1, x2));

      if (isTimelineFilterActive()) {
        ctx.fillStyle = "rgba(250, 204, 21, 0.28)";
        ctx.fillRect(left, 0, Math.max(1, right - left), height);
        ctx.fillStyle = "#facc15";
        ctx.fillRect(Math.round(left), 0, 2 * dpr, height);
        ctx.fillRect(Math.round(right), 0, 2 * dpr, height);
      }

      drawTimelineTickLabels(ctx, width, height, dpr);
    }

    function drawTimelineTickLabels(ctx, width, height, dpr) {
      const minDate = new Date(timelineState.min);
      const maxDate = new Date(timelineState.max);
      ctx.font = Math.round(9 * dpr) + "px system-ui, sans-serif";
      ctx.textBaseline = "top";
      ctx.fillStyle = "#71717a";
      const left = shortTimelineDate(minDate);
      const right = shortTimelineDate(maxDate);
      ctx.fillText(left, 4 * dpr, 2 * dpr);
      const rightW = ctx.measureText(right).width;
      ctx.fillText(right, width - rightW - 4 * dpr, 2 * dpr);
    }

    function shortTimelineDate(d) {
      if (!(d instanceof Date) || Number.isNaN(d.getTime())) return "";
      return d.toLocaleDateString(DATE_LOCALE, { day: "2-digit", month: "2-digit", year: "2-digit" });
    }

    function updateTimelineLabel() {
      const label = document.getElementById("timelineLabel");
      if (!label) return;
      if (!timelineState.points.length || !isTimelineFilterActive()) {
        label.textContent = timelineState.points.length ? t("messagesCount", timelineState.points.length) : t("noDates");
        return;
      }

      label.textContent = formatTimelineRange(timelineState.selectedMin, timelineState.selectedMax);
    }

    function formatTimelineRange(min, max) {
      const a = new Date(min);
      const b = new Date(max);
      const sameDay = a.toDateString() === b.toDateString();
      if (sameDay) {
        return a.toLocaleDateString(DATE_LOCALE) + " " +
          a.toLocaleTimeString(DATE_LOCALE, { hour: "2-digit", minute: "2-digit" }) + "–" +
          b.toLocaleTimeString(DATE_LOCALE, { hour: "2-digit", minute: "2-digit" });
      }
      return a.toLocaleDateString(DATE_LOCALE) + "–" + b.toLocaleDateString(DATE_LOCALE);
    }

    function resetTimelineFilter() {
      if (!timelineState.points.length) return;
      timelineState.selectedMin = timelineState.min;
      timelineState.selectedMax = timelineState.max;
      applyTimelineFilter();
    }

    function applyTimelineFilter() {
      updateTimelineLabel();
      renderTimelineCanvas();
      const filtered = getCurrentlyFilteredChats();
      renderChatList(filtered);
      document.getElementById("chatCount").textContent = isTimelineFilterActive()
        ? (filtered.length + " / " + allChats.length)
        : String(allChats.length);

      if (!currentChat || !filtered.some(c => c.id === currentChat.id)) {
        if (filtered[0]) showChat(filtered[0]);
        else {
          currentChat = null;
          document.getElementById("messagesArea").innerHTML = '<div class="text-zinc-500 text-sm p-4">' + escapeHtml(t("noChatsInRange")) + '</div>';
        }
      } else {
        showChat(currentChat);
      }
    }

    function isTimelineFilterActive() {
      if (!timelineState.points.length || timelineState.min === null || timelineState.max === null) return false;
      const tolerance = Math.max(1, (timelineState.max - timelineState.min) * 0.001);
      return timelineState.selectedMin > timelineState.min + tolerance || timelineState.selectedMax < timelineState.max - tolerance;
    }

    function getMessageDate(msg) {
      return coerceToDate(msg?.created_at) || coerceToDate(extractDateValue(msg?.raw)) || null;
    }

    function getTimelineVisibleMessages(chat) {
      const messages = Array.isArray(chat?.messages) ? chat.messages : [];
      if (!isTimelineFilterActive()) return messages;
      return messages.filter(messageInTimelineRange);
    }

    function messageInTimelineRange(msg) {
      const d = getMessageDate(msg);
      if (!d) return false;
      const t = d.getTime();
      return t >= timelineState.selectedMin && t <= timelineState.selectedMax;
    }

    function chatMatchesTimeline(chat) {
      if (!isTimelineFilterActive()) return true;
      return getTimelineVisibleMessages(chat).length > 0;
    }

    function formatDate(value) {
      return formatDateMaybe(value) || "";
    }

    function formatDateMaybe(value) {
      const d = coerceToDate(value);
      if (!d) return null;

      return d.toLocaleDateString(DATE_LOCALE) + " " + d.toLocaleTimeString(DATE_LOCALE, { hour: "2-digit", minute: "2-digit" });
    }

    function extractDateValue(obj) {
      if (!obj || typeof obj !== "object") return null;

      const directKeys = [
        "created_at", "create_time", "created", "creation_time", "created_time",
        "createdAt", "createTime", "creationTime", "createdTime",
        "timestamp", "time", "date", "datetime",
        "last_message_at", "lastMessageAt", "updated_at", "updatedAt", "update_time", "updateTime"
      ];

      for (const key of directKeys) {
        if (Object.prototype.hasOwnProperty.call(obj, key) && obj[key] !== undefined && obj[key] !== null && obj[key] !== obj) {
          return obj[key];
        }
      }

      // Fallback для вариантов с другим регистром: createdAt / created_at / CreateTime и т.п.
      const wanted = new Set(directKeys.map(k => k.toLowerCase()));
      for (const key of Object.keys(obj)) {
        if (wanted.has(key.toLowerCase()) && obj[key] !== undefined && obj[key] !== null && obj[key] !== obj) {
          return obj[key];
        }
      }

      return null;
    }

    function coerceToDate(value) {
      if (value === null || value === undefined || value === "") return null;

      if (value instanceof Date) {
        return Number.isNaN(value.getTime()) ? null : value;
      }

      if (typeof value === "number") {
        return dateFromTimestampNumber(value);
      }

      if (typeof value === "string") {
        const trimmed = value.trim();
        if (!trimmed) return null;

        // Numeric timestamps sometimes arrive as strings.
        if (/^-?\d+(\.\d+)?$/.test(trimmed)) {
          return dateFromTimestampNumber(Number(trimmed));
        }

        const d = new Date(trimmed);
        return Number.isNaN(d.getTime()) ? null : d;
      }

      if (typeof value === "object") {
        // Common JSON/Mongo/Firebase/Firestore/protobuf shapes.
        const directKeys = [
          "$date", "$numberLong", "$numberInt", "date", "iso", "isoString", "datetime", "timestamp",
          "time", "value", "created_at", "create_time", "created", "creation_time", "created_time",
          "createdAt", "createTime", "creationTime", "createdTime",
          "updated_at", "updatedAt", "updated", "update_time", "updateTime",
          "last_message_at", "lastMessageAt"
        ];

        for (const key of directKeys) {
          if (value[key] !== undefined && value[key] !== null && value[key] !== value) {
            const d = coerceToDate(value[key]);
            if (d) return d;
          }
        }

        const seconds = firstFiniteNumber(
          value.seconds, value._seconds, value.secs, value.sec,
          value.epochSeconds, value.epoch_seconds, value.unix, value.unixSeconds
        );
        if (seconds !== null) {
          const nanos = firstFiniteNumber(value.nanoseconds, value._nanoseconds, value.nanos, value.nano) || 0;
          return dateFromTimestampNumber(seconds * 1000 + nanos / 1000000, true);
        }

        // Some exports store millisecond timestamp as { ms: ... } or { millis: ... }.
        const millis = firstFiniteNumber(
          value.ms, value.millis, value.milliseconds, value._milliseconds,
          value.epochMillis, value.epoch_millis, value.timestampMs, value.timestamp_ms
        );
        if (millis !== null) return dateFromTimestampNumber(millis, true);

        return null;
      }

      return null;
    }

    function firstFiniteNumber(...values) {
      for (const v of values) {
        if (v === null || v === undefined || v === "") continue;
        const n = Number(v);
        if (Number.isFinite(n)) return n;
      }
      return null;
    }

    function dateFromTimestampNumber(n, alreadyMillis = false) {
      if (!Number.isFinite(n)) return null;

      let ms = n;
      if (!alreadyMillis) {
        const abs = Math.abs(n);
        // seconds, milliseconds, microseconds, nanoseconds
        if (abs < 100000000000) ms = n * 1000;
        else if (abs > 1000000000000000) ms = n / 1000000;
        else if (abs > 10000000000000) ms = n / 1000;
      }

      const d = new Date(ms);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function sanitizeFileName(name) {
      return String(name || "chat").replace(/[^а-яА-Яa-zA-Z0-9._-]+/g, "_").slice(0, 120);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function cryptoRandomId() {
      if (window.crypto && typeof crypto.randomUUID === "function") return crypto.randomUUID();
      return "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }
  </script>
</body>
